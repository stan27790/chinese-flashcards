<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华语 | Premium Chinese Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #fdfbfb 0%, #ebedee 100%);
        }
        .perspective { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-transition { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .is-flipped { transform: rotateY(180deg); }
        
        .view-panel {
            transition: opacity 0.25s ease-in-out, transform 0.25s ease-in-out;
        }
        .hidden-panel {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            position: absolute;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start bg-slate-50 text-slate-800 antialiased p-4 sm:p-8">

    <header class="w-full max-w-4xl flex items-center justify-between mb-8 bg-white/80 backdrop-blur-md px-6 py-4 rounded-2xl shadow-sm border border-slate-100">
        <div class="flex items-center gap-3">
            <span class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">华语 Huáyǔ</span>
        </div>
        <nav class="flex gap-2 bg-slate-100/80 p-1 rounded-xl">
            <button id="nav-study" onclick="switchView('study')" class="px-4 py-2 rounded-lg font-medium text-sm transition-all bg-white text-blue-600 shadow-sm">Study</button>
            <button id="nav-library" onclick="switchView('library')" class="px-4 py-2 rounded-lg font-medium text-sm transition-all text-slate-600 hover:text-slate-900">Library</button>
        </nav>
    </header>

    <main class="w-full max-w-xl relative">
        
        <div id="panel-study" class="view-panel flex flex-col w-full">
            <div class="flex justify-between items-center mb-4 px-2 text-xs font-semibold uppercase tracking-wider text-slate-400">
                <span id="cards-left" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full border border-blue-100">⚡ Loading...</span>
                <span id="streak-info" class="bg-amber-50 text-amber-600 px-3 py-1 rounded-full border border-amber-100">🔥 Streak: 0</span>
            </div>

            <div class="perspective w-full h-[360px] mb-8 group">
                <div id="card" onclick="flipCard()" class="preserve-3d card-transition w-full h-full relative cursor-pointer">
                    
                    <div class="backface-hidden absolute inset-0 bg-white border border-slate-100 rounded-3xl p-8 flex flex-col items-center justify-center shadow-xl shadow-slate-200/50">
                        <span id="front-level" class="absolute top-6 right-6 px-3 py-1 bg-slate-100 text-slate-600 text-xs font-bold rounded-full">Lvl 1</span>
                        <h1 id="display-char" class="text-7xl font-bold text-slate-800 tracking-tight transition-all duration-300">汉字</h1>
                        <span class="absolute bottom-6 text-slate-300 text-xs tracking-widest uppercase font-semibold">Tap to Flip</span>
                    </div>

                    <div class="backface-hidden rotate-y-180 absolute inset-0 bg-gradient-to-br from-blue-600 to-indigo-700 text-white rounded-3xl p-8 flex flex-col items-center justify-center shadow-xl shadow-indigo-500/20">
                        <span id="back-level" class="absolute top-6 right-6 px-3 py-1 bg-white/20 text-white text-xs font-bold rounded-full">Lvl 1</span>
                        <div id="display-pinyin" class="text-3xl font-semibold mb-3 tracking-wide text-indigo-100">Pīnyīn</div>
                        <div id="display-meaning" class="text-2xl font-light opacity-95">Meaning</div>
                    </div>

                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="handleAnswer(false)" class="flex-1 bg-white hover:bg-rose-50 border border-slate-200 hover:border-rose-200 text-rose-500 font-semibold py-4 rounded-2xl shadow-sm transition-all duration-200 active:scale-98">
                    Forgot ❌
                </button>
                <button onclick="handleAnswer(true)" class="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold py-4 rounded-2xl shadow-md shadow-indigo-500/10 transition-all duration-200 active:scale-98">
                    Got it! 👍
                </button>
            </div>
        </div>

        <div id="panel-library" class="view-panel hidden-panel flex flex-col w-full">
            <div class="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm mb-6">
                <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">➕ Add New Flashcard</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
                    <input type="text" id="input-char" placeholder="Character (猫)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    <input type="text" id="input-pinyin" placeholder="Pinyin (māo)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 transition-colors">
                    <input type="text" id="input-meaning" placeholder="Meaning (Cat)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 transition-colors">
                </div>
                <button onclick="addNewWord()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3 rounded-xl text-sm transition-colors shadow-sm">
                    Save to Cloud Database
                </button>
            </div>

            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Your Collection (<span id="lib-count">0</span>)</h3>
                <span class="text-xs text-slate-400">Click a card to reveal meaning</span>
            </div>
            
            <div id="library-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[500px] overflow-y-auto pr-1">
            </div>
        </div>

    </main>

    <script>
        // ================= SUPABASE INITIALIZATION =================
        const SUPABASE_URL = "https://gjhgufytyjzhqhowvemj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqaGd1Znl0eWp6aHFob3d2ZW1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTk1MjksImV4cCI6MjA5NTQ3NTUyOX0.Q46ZZG17bqkrF2Uydw6ey-gI1gkfLFGJuq8Hawk5_SU";
        
        let supabase;
        let deck = [];
        let currentCard = null;
        let streak = 0;

        // Global DOM Element Variables
        let cardEl, charEl, pinyinEl, meaningEl, frontLvlEl, backLvlEl, leftEl, streakEl, libraryGridEl, libCountEl;

        // Safely catch DOM loading window frames
        document.addEventListener("DOMContentLoaded", () => {
            cardEl = document.getElementById('card');
            charEl = document.getElementById('display-char');
            pinyinEl = document.getElementById('display-pinyin');
            meaningEl = document.getElementById('display-meaning');
            frontLvlEl = document.getElementById('front-level');
            backLvlEl = document.getElementById('back-level');
            leftEl = document.getElementById('cards-left');
            streakEl = document.getElementById('streak-info');
            libraryGridEl = document.getElementById('library-grid');
            libCountEl = document.getElementById('lib-count');

            // Initialize connection safely after library confirmation
            if (typeof window.supabase !== 'undefined') {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                fetchDeckFromCloud();
            } else {
                console.error("Supabase CDN failed to initialize entirely.");
                if (leftEl) leftEl.innerText = "Library Load Error ❌";
            }
        });

        async function fetchDeckFromCloud() {
            try {
                const { data, error } = await supabase.from('flashcards').select('*');
                if (error) {
                    console.error("Error loading data:", error);
                    if (leftEl) leftEl.innerText = "Error syncing ❌";
                    return;
                }
                deck = data || [];
                queueNextCard();
                renderLibrary();
            } catch (err) {
                console.error("Fetch intercepted exception:", err);
            }
        }

        function switchView(view) {
            const studyPanel = document.getElementById('panel-study');
            const libraryPanel = document.getElementById('panel-library');
            const navStudy = document.getElementById('nav-study');
            const navLibrary = document.getElementById('nav-library');

            if (!studyPanel || !libraryPanel) return;

            if (view === 'study') {
                studyPanel.classList.remove('hidden-panel');
                libraryPanel.classList.add('hidden-panel');
                navStudy.className = "px-4 py-2 rounded-lg font-medium text-sm transition-all bg-white text-blue-600 shadow-sm";
                navLibrary.className = "px-4 py-2 rounded-lg font-medium text-sm transition-all text-slate-600 hover:text-slate-900";
                queueNextCard();
            } else {
                studyPanel.classList.add('hidden-panel');
                libraryPanel.classList.remove('hidden-panel');
                navLibrary.className = "px-4 py-2 rounded-lg font-medium text-sm transition-all bg-white text-blue-600 shadow-sm";
                navStudy.className = "px-4 py-2 rounded-lg font-medium text-sm transition-all text-slate-600 hover:text-slate-900";
                renderLibrary();
            }
        }

        function flipCard() {
            if (deck.length === 0 || !cardEl) return;
            cardEl.classList.toggle('is-flipped');
        }

        function queueNextCard() {
            if (!charEl || !pinyinEl || !meaningEl || !leftEl || !streakEl) return;

            if (deck.length === 0) {
                charEl.innerText = "空";
                pinyinEl.innerText = "";
                meaningEl.innerText = "Your deck is empty. Switch to the Library tab to add words!";
                leftEl.innerText = "0 cards due";
                return;
            }

            const now = new Date().getTime();
            let dueCards = deck.filter(card => new Date(card.next_review).getTime() <= now);
            if (dueCards.length === 0) dueCards = deck.filter(card => card.level < 4);
            if (dueCards.length === 0) dueCards = deck;

            const randomIndex = Math.floor(Math.random() * dueCards.length);
            currentCard = dueCards[randomIndex];

            charEl.innerText = currentCard.character || currentCard.char || "空";
            pinyinEl.innerText = currentCard.pinyin || "";
            meaningEl.innerText = currentCard.meaning || "";
            
            if (frontLvlEl) frontLvlEl.innerText = `Lvl ${currentCard.level || 1}`;
            if (backLvlEl) backLvlEl.innerText = `Lvl ${currentCard.level || 1}`;
            
            const totalDueCount = deck.filter(card => new Date(card.next_review).getTime() <= now).length;
            leftEl.innerText = `⚡ ${totalDueCount} due reviews`;
            streakEl.innerText = `🔥 Streak: ${streak}`;
        }

        async function handleAnswer(wasCorrect) {
            if (!currentCard) return;

            if (wasCorrect) {
                streak++;
                if (currentCard.level < 5) currentCard.level++;
            } else {
                streak = 0;
                currentCard.level = 1;
            }

            const intervals = [0, 30000, 300000, 3600000, 86400000, 345600000];
            const nextReviewDate = new Date(Date.now() + intervals[currentCard.level]).toISOString();

            const { error } = await supabase
                .from('flashcards')
                .update({ level: currentCard.level, next_review: nextReviewDate })
                .eq('id', currentCard.id);

            if (error) console.error("Could not sync response update:", error);

            currentCard.next_review = nextReviewDate;

            if (cardEl && cardEl.classList.contains('is-flipped')) {
                cardEl.classList.remove('is-flipped');
                setTimeout(() => { queueNextCard(); }, 300);
            } else {
                queueNextCard();
            }
        }

        async function addNewWord() {
            const charInput = document.getElementById('input-char');
            const pinyinInput = document.getElementById('input-pinyin');
            const meaningInput = document.getElementById('input-meaning');

            if (!charInput || !pinyinInput || !meaningInput) return;

            const character = charInput.value.trim();
            const pinyin = pinyinInput.value.trim();
            const meaning = meaningInput.value.trim();

            if (!character || !pinyin || !meaning) { alert("Fill out all parameters!"); return; }

            const nextReviewDate = new Date().toISOString();

            const { data, error } = await supabase
                .from('flashcards')
                .insert([{ character, pinyin, meaning, level: 1, next_review: nextReviewDate }])
                .select();

            if (error) {
                alert("Database submission failed.");
                console.error(error);
                return;
            }

            if (data && data.length > 0) deck.push(data[0]);

            charInput.value = ""; pinyinInput.value = ""; meaningInput.value = "";
            renderLibrary();
        }

        function renderLibrary() {
            if (!libraryGridEl || !libCountEl) return;
            
            libraryGridEl.innerHTML = "";
            libCountEl.innerText = deck.length;

            deck.forEach(word => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-100 rounded-2xl p-5 text-center shadow-sm cursor-pointer hover:border-blue-400 hover:shadow-md transition-all duration-200 group flex flex-col justify-center min-h-[110px]";
                
                card.onclick = () => {
                    const TargetDetails = card.querySelector('.lib-details');
                    const TargetMain = card.querySelector('.lib-main-char');
                    if (TargetDetails && TargetMain) {
                        TargetDetails.classList.toggle('hidden');
                        TargetMain.classList.toggle('hidden');
                    }
                };

                const wordDisplay = word.character || word.char || "";

                card.innerHTML = `
                    <div class="lib-main-char text-3xl font-bold text-slate-700 group-hover:text-blue-600 transition-colors">${wordDisplay}</div>
                    <div class="lib-details hidden text-left flex flex-col gap-0.5 justify-center h-full">
                        <div class="text-xs font-semibold uppercase tracking-wider text-slate-400">Pinyin</div>
                        <div class="text-sm font-bold text-slate-700 mb-2">${word.pinyin || ""}</div>
                        <div class="text-xs font-semibold uppercase tracking-wider text-slate-400">Meaning</div>
                        <div class="text-sm font-medium text-slate-600">${word.meaning || ""}</div>
                    </div>
                `;
                libraryGridEl.appendChild(card);
            });
        }
    </script>
</body>
</html>
